name: ypower
options:
  bundleIdPrefix: com.dongeui
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    # opt-in 크래시 리포팅(Sentry) DSN. 기본 빈 값 = 기능 전체 비활성(개발 빌드).
    # 릴리스 빌드에서만 xcodebuild ... YPOWER_SENTRY_DSN=... 으로 주입한다.
    YPOWER_SENTRY_DSN: ""
packages:
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa.git
    from: 8.0.0
targets:
  ypower:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ypower
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dongeui.ypower
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ypower/Info.plist
        CODE_SIGN_ENTITLEMENTS: ypower/ypower.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - package: Sentry
        product: Sentry
  ypowerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ypowerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dongeui.ypowerTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ypower
schemes:
  ypower:
    build:
      targets:
        ypower: all
        ypowerTests: [test]
    test:
      targets:
        - ypowerTests
    run:
      config: Debug
